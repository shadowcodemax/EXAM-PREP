<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EXAM PREP | Login</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body class="auth-page">
    <canvas id="particleCanvas"></canvas>
    
    <div class="auth-container">
        <div class="auth-card glass">
            <div class="auth-logo">📘 EXAM PREP</div>
            <h2>Welcome Back</h2>
            <p>Login to continue your CBT journey</p>
            
            <form id="loginForm">
                <div class="input-group">
                    <label>📧 Email or Username</label>
                    <input type="text" id="loginEmail" placeholder="Enter your email or username" required>
                </div>
                
                <div class="input-group">
                    <label>🔒 Password</label>
                    <input type="password" id="loginPassword" placeholder="Enter your password" required>
                </div>
                
                <button type="submit" class="btn-auth">Login →</button>
            </form>
            
            <div class="auth-links">
                <a href="signup.html">Don't have an account? <strong>Create Account</strong></a>
            </div>
        </div>
    </div>

    <script src="auth.js"></script>
    <script src="script.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>
    <script src="auth.js"></script>
    <script src="dashboard.js"></script>
</body>
</html>
