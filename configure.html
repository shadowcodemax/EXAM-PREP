<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EXAM PREP | Configure Session</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <canvas id="particleCanvas"></canvas>
    
    <div class="sidebar">
        <div class="sidebar-logo">📘 EXAM PREP</div>
        <nav class="sidebar-nav">
            <a href="dashboard.html" class="nav-item">📊 Dashboard</a>
            <a href="study.html" class="nav-item">📚 Study Notes</a>
            <a href="configure.html" class="nav-item active">⚔️ Challenge Arena</a>
            <a href="leaderboard.html" class="nav-item">🏆 Leaderboard</a>
            <a href="#" class="nav-item" onclick="logout()">🚪 Logout</a>
        </nav>
    </div>

    <div class="main-content">
        <div class="configure-container">
            <div class="configure-header">
                <h1>⚔️ CHALLENGE ARENA</h1>
                <p>Configure your CBT experience</p>
            </div>

            <div class="configure-card glass">
                <h3>📋 Configure Your Session</h3>
                <p class="configure-subtitle">Tailor the CBT experience to your current study goals.</p>

                <div class="config-section">
                    <div class="config-group">
                        <label>🎯 Select Course</label>
                        <select id="configCourse" class="config-select">
                            <option value="">-- Select a course --</option>
                            <option value="ANA101">ANA101 - Gross Anatomy I</option>
                            <option value="ANA102">ANA102 - Gross Anatomy II</option>
                            <option value="BCH101">BCH101 - General Biochemistry</option>
                            <option value="BIO101">BIO101 - General Biology I</option>
                            <option value="BIO102">BIO102 - Plant Diversity</option>
                            <option value="BMS101">BMS101 - Intro to Medical Sciences</option>
                            <option value="BMS102">BMS102 - Medical Biochemistry</option>
                            <option value="BMS103">BMS103 - Medical Physiology</option>
                            <option value="BMS104">BMS104 - Medical Anatomy</option>
                            <option value="CHM101">CHM101 - General Chemistry I</option>
                            <option value="COS101">COS101 - Intro to Computer Science</option>
                            <option value="CYB101">CYB101 - Cybersecurity</option>
                            <option value="GST101">GST101 - Use of English</option>
                            <option value="GST102">GST102 - Nigerian Peoples & Culture</option>
                            <option value="MTH101">MTH101 - Calculus I</option>
                            <option value="MTH102">MTH102 - Calculus II</option>
                            <option value="PHY101">PHY101 - General Physics I</option>
                            <option value="STA101">STA101 - Statistics</option>
                        </select>
                    </div>

                    <div class="config-group">
                        <label>📝 Feedback Mode</label>
                        <div class="radio-group">
                            <label class="radio-option">
                                <input type="radio" name="feedbackMode" value="instant" checked>
                                <span class="radio-label">Instant Feedback</span>
                            </label>
                            <label class="radio-option">
                                <input type="radio" name="feedbackMode" value="review">
                                <span class="radio-label">Exam Simulation</span>
                            </label>
                        </div>
                    </div>

                    <div class="config-group">
                        <label>⏱️ Timer Duration</label>
                        <div class="timer-options">
                            <label class="timer-option"><input type="radio" name="timerDuration" value="15"> 15 Minutes</label>
                            <label class="timer-option"><input type="radio" name="timerDuration" value="30" checked> 30 Minutes</label>
                            <label class="timer-option"><input type="radio" name="timerDuration" value="60"> 60 Minutes</label>
                            <label class="timer-option"><input type="radio" name="timerDuration" value="unlimited"> Unlimited</label>
                        </div>
                    </div>

                    <div class="config-group">
                        <label>📊 Question Count</label>
                        <div class="question-options">
                            <label class="question-option"><input type="radio" name="questionCount" value="10" checked> 10 Questions</label>
                            <label class="question-option"><input type="radio" name="questionCount" value="20"> 20 Questions</label>
                            <label class="question-option"><input type="radio" name="questionCount" value="30"> 30 Questions</label>
                            <label class="question-option"><input type="radio" name="questionCount" value="50"> 50 Questions</label>
                        </div>
                    </div>

                    <button id="startPracticeBtn" class="btn-start">🚀 START PRACTICE SESSION →</button>
                </div>
            </div>
        </div>
    </div>

    <script src="auth.js"></script>
    <script>
        // Get current user
        const currentUser = JSON.parse(localStorage.getItem('currentUser'));
        if (currentUser) {
            const userNameSpan = document.querySelector('.user-name');
            if (userNameSpan) userNameSpan.textContent = currentUser.name.split(' ')[0];
        }
        
        // Start practice session
        document.getElementById('startPracticeBtn').addEventListener('click', function() {
            const course = document.getElementById('configCourse').value;
            if (!course) {
                alert('Please select a course!');
                return;
            }
            
            const feedbackMode = document.querySelector('input[name="feedbackMode"]:checked').value;
            const timerDuration = document.querySelector('input[name="timerDuration"]:checked').value;
            const questionCount = parseInt(document.querySelector('input[name="questionCount"]:checked').value);
            
            // Save config
            sessionStorage.setItem('examConfig', JSON.stringify({
                course: course,
                feedbackMode: feedbackMode,
                timerDuration: timerDuration === 'unlimited' ? null : parseInt(timerDuration),
                questionCount: questionCount
            }));
            
            window.location.href = 'exam.html';
        });
        
        // Logout function
        window.logout = function() {
            localStorage.removeItem('currentUser');
            window.location.href = 'index.html';
        };
    </script>
</body>
</html>
