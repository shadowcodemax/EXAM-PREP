<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EXAM PREP | Study Mode</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <canvas id="particleCanvas"></canvas>
    
    <!-- Sidebar -->
    <div class="sidebar">
        <div class="sidebar-logo">📘 EXAM PREP</div>
        <nav class="sidebar-nav">
            <a href="dashboard.html" class="nav-item">
                <span class="nav-icon">📊</span>
                <span>Dashboard</span>
            </a>
            <a href="study.html" class="nav-item active">
                <span class="nav-icon">📚</span>
                <span>Study Notes</span>
            </a>
            <a href="configure.html" class="nav-item">
                <span class="nav-icon">⚔️</span>
                <span>Challenge Arena</span>
            </a>
            <a href="leaderboard.html" class="nav-item">
                <span class="nav-icon">🏆</span>
                <span>Leaderboard</span>
            </a>
            <a href="#" class="nav-item" onclick="logout()">
                <span class="nav-icon">🚪</span>
                <span>Logout</span>
            </a>
        </nav>
        <div class="sidebar-footer">
            <div class="user-info">
                <div class="user-avatar">👤</div>
                <div class="user-name" id="userName">Scholar</div>
            </div>
        </div>
    </div>

    <!-- Main Content -->
    <div class="main-content">
        <div class="study-header">
            <h1>📚 Study Notes</h1>
            <p>Select a course to access comprehensive lecture notes</p>
        </div>

        <!-- Course Selection Grid -->
        <div class="study-courses-grid" id="studyCoursesGrid"></div>

        <!-- Notes Panel (Hidden by default) -->
        <div id="studyNotesPanel" class="study-notes-panel glass" style="display: none;">
            <div class="notes-header">
                <h2 id="notesCourseTitle">Course Notes</h2>
                <button class="close-notes" onclick="closeNotes()">✕</button>
            </div>
            <div class="notes-content" id="notesContent"></div>
            
            <!-- AI Tutor Section -->
            <div class="ai-tutor-section">
                <h3>🤖 AI Tutor</h3>
                <p>Ask me anything about this course</p>
                <div class="chat-box" id="chatBox">
                    <div class="chat-message bot">👋 Hi! I'm your AI Tutor. Ask me anything about this course!</div>
                </div>
                <div class="ai-input-group">
                    <input type="text" id="aiQuestion" placeholder="Example: Explain the difference between gymnosperms and angiosperms..." onkeypress="if(event.key==='Enter') askAITutor()">
                    <button onclick="askAITutor()">Send →</button>
                </div>
                <div id="aiLoading" style="display:none; margin-top:1rem;">🤔 Thinking...</div>
            </div>
        </div>
    </div>

    <script src="auth.js"></script>
    <script src="questions.json.js"></script>
    <script src="study-mode.js"></script>
    <script src="script.js"></script>
</body>
</html>
